        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Reference
      description: Delete a reference and all associated S3 objects.
      operationId: delete_reference_references__reference_id__delete
      parameters:
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
          title: Reference Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      summary: Update Reference
      description: Partial update of a reference. Re-extracts if description changes.
      operationId: update_reference_references__reference_id__put
      parameters:
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
          title: Reference Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /references/{reference_id}/extract:
    post:
      summary: Extract Reference
      description: Manually trigger LLM extraction for a reference.
      operationId: extract_reference_references__reference_id__extract_post
      parameters:
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
          title: Reference Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /references/{reference_id}/document/{filename}:
    delete:
      summary: Delete Document
      description: Delete a specific document from a reference. Re-extracts from remaining
        context.
      operationId: delete_document_references__reference_id__document__filename__delete
      parameters:
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
          title: Reference Id
      - name: filename
        in: path
        required: true
        schema:
          type: string
          title: Filename
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /references/{reference_id}/document:
    post:
      summary: Upload Document
      description: Upload a document (PDF/DOCX) to a reference. Triggers re-extraction.
      operationId: upload_document_references__reference_id__document_post
      parameters:
      - name: reference_id
        in: path
        required: true
        schema:
          type: string
          title: Reference Id
      requestBody:
        required: true
        content:
