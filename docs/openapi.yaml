openapi: 3.1.0
info:
  title: RFP Scraper API
  description: Read-only API for RFP scraper data
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health Check
      description: 'Check API health by verifying Postgres connectivity.


        Runs a simple SELECT 1 query. Returns 200 on success, 503 if unreachable.'
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /sources/{source_id}/runs:
    get:
      summary: List Runs
      description: List scrape runs for a source, ordered by run_date descending.
      operationId: list_runs_sources__source_id__runs_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /sources/{source_id}/runs/{run_date}:
    get:
      summary: Get Run
      description: Get a single run by source_id and run_date, including full statistics.
      operationId: get_run_sources__source_id__runs__run_date__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: run_date
        in: path
        required: true
        schema:
          type: string
          title: Run Date
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders:
    get:
      summary: List Tenders
      description: List tenders with optional filters, sorting, and offset pagination.
      operationId: list_tenders_tenders_get
      parameters:
      - name: source_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Id
      - name: discovered_from
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Discovered From
      - name: discovered_to
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Discovered To
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: fully_visible
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Fully Visible
      - name: analyzed
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Analyzed
      - name: min_score
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Min Score
      - name: tender_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tender Type
      - name: min_interestingness
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 10
            minimum: 1
          - type: 'null'
          title: Min Interestingness
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Q
      - name: sort_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Sort By
      - name: sort_direction
        in: query
        required: false
        schema:
          type: string
          default: desc
          title: Sort Direction
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}:
    get:
      summary: Get Tender
      description: Get full tender detail by PK, merging S3 content for completed
        tenders.
      operationId: get_tender_tenders__source_id___tender_id__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenderDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/audit:
    get:
      summary: Get Tender Audit
      description: Return audit trail for a tender, ordered by created_at DESC.
      operationId: get_tender_audit_tenders__source_id___tender_id__audit_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      - name: run_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Id
      - name: step
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Step
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditRecordResponse'
                title: Response Get Tender Audit Tenders  Source Id   Tender Id  Audit
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /sources/{source_id}/runs/{run_date}/tenders:
    get:
      summary: List Run Tenders
      description: List tenders discovered or processed by a specific run.
      operationId: list_run_tenders_sources__source_id__runs__run_date__tenders_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: run_date
        in: path
        required: true
        schema:
          type: string
          title: Run Date
      - name: phase
        in: query
        required: false
        schema:
          type: string
          pattern: ^(discovered|processed)$
          default: discovered
          title: Phase
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/extract-team:
    post:
      summary: Extract Team
      description: Trigger team requirement extraction for a single tender.
      operationId: extract_team_tenders__source_id___tender_id__extract_team_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Extract Team Tenders  Source Id   Tender Id  Extract
                  Team Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/extract-references:
    post:
      summary: Extract References
      description: Trigger reference requirement extraction for a single tender.
      operationId: extract_references_tenders__source_id___tender_id__extract_references_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Extract References Tenders  Source Id   Tender Id  Extract
                  References Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/check-exclusion:
    post:
      summary: Check Exclusion
      description: Trigger exclusion criteria evaluation for a single tender.
      operationId: check_exclusion_tenders__source_id___tender_id__check_exclusion_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Check Exclusion Tenders  Source Id   Tender Id  Check
                  Exclusion Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/team-match:
    post:
      summary: Team Match
      description: Trigger team match fitness scoring for a single tender.
      operationId: team_match_tenders__source_id___tender_id__team_match_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Team Match Tenders  Source Id   Tender Id  Team Match
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/reference-match:
    post:
      summary: Reference Match
      description: Trigger reference match fitness scoring for a single tender.
      operationId: reference_match_tenders__source_id___tender_id__reference_match_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Reference Match Tenders  Source Id   Tender Id  Reference
                  Match Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/feedback:
    post:
      summary: Create Feedback
      description: Create or update feedback for a tender (upsert — one feedback per
        tender).
      operationId: create_feedback_tenders__source_id___tender_id__feedback_post
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Feedback
      description: Remove feedback for a tender. Idempotent — returns 204 even if
        no record exists.
      operationId: delete_feedback_tenders__source_id___tender_id__feedback_delete
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/documents:
    get:
      summary: List Documents
      description: List all documents for a tender with presigned download URLs.
      operationId: list_documents_tenders__source_id___tender_id__documents_get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tenders/{source_id}/{tender_id}/documents/{filename}:
    get:
      summary: Get Document
      description: Return a presigned URL for a single tender document.
      operationId: get_document_tenders__source_id___tender_id__documents__filename__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      - name: tender_id
        in: path
        required: true
        schema:
          type: string
          title: Tender Id
      - name: filename
        in: path
        required: true
        schema:
          type: string
          title: Filename
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /sources/:
    get:
      summary: List Sources
      description: Return all loaded source configs as a paginated list.
      operationId: list_sources_sources__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /sources/{source_id}:
    get:
      summary: Get Source
      description: Return full config for a single source, sanitized.
      operationId: get_source_sources__source_id__get
      parameters:
      - name: source_id
        in: path
        required: true
        schema:
          type: string
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /settings:
    get:
      summary: List Settings
      description: List all settings.
      operationId: list_settings_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsListResponse'
  /settings/{setting_type}:
    get:
      summary: Get Setting
      description: Get a single setting by type.
      operationId: get_setting_settings__setting_type__get
      parameters:
      - name: setting_type
        in: path
        required: true
        schema:
          type: string
          title: Setting Type
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      summary: Update Setting
      description: Full replacement of a setting. Validates body against the type-specific
        model.
      operationId: update_setting_settings__setting_type__put
      parameters:
      - name: setting_type
        in: path
        required: true
        schema:
          type: string
          title: Setting Type
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /team:
    post:
      summary: Create Team Member
      description: Create a new team member with slug generation and email uniqueness
        check.
      operationId: create_team_member_team_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List Team Members
      description: List team members with pagination, optional type filter and search.
      operationId: list_team_members_team_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Type
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /team/{member_id}:
    get:
      summary: Get Team Member
      description: Get a single team member by UUID.
      operationId: get_team_member_team__member_id__get
      parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: string
          title: Member Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      summary: Update Team Member
      description: Partial update of a team member. Returns the full updated record.
      operationId: update_team_member_team__member_id__put
      parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: string
          title: Member Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Delete Team Member
      description: Delete a team member and clean up associated S3 keys.
      operationId: delete_team_member_team__member_id__delete
      parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: string
          title: Member Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /team/{member_id}/cv:
    post:
      summary: Upload Cv
      description: Upload a CV (PDF/DOCX) for a team member. Stores in S3 and triggers
        extraction.
      operationId: upload_cv_team__member_id__cv_post
      parameters:
      - name: member_id
        in: path
        required: true
        schema:
          type: string
          title: Member Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_cv_team__member_id__cv_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /references:
    post:
      summary: Create Reference
      description: Create a new reference with slug generation and optional LLM extraction.
      operationId: create_reference_references_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      summary: List References
      description: List references with pagination, optional sector/year filters and
        search.
      operationId: list_references_references_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Page Size
      - name: sector
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Sector
      - name: year
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Year
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          title: Search
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /references/{reference_id}:
    get:
      summary: Get Reference
      description: Get a single reference with enriched experts and document presigned
        URLs.
      operationId: get_reference_references__reference_id__get
      parameters:
      - name: reference_id
        in: path
        required: true
        schema:
